services:
  traefik:
    image: traefik:v3.4
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
      - --entrypoints.web.forwardedHeaders.insecure=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - diluu-dev
    extra_hosts:
      # Docker Desktop WSL2: `host.docker.internal` points at the Docker VM,
      # not the WSL distro where the devhub process lives. `host-gateway`
      # resolves to the docker engine host, which IS the WSL distro — so
      # traefik can reach the devhub on localhost:3100 of that distro.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

networks:
  diluu-dev:
    external: true
    name: diluu-dev
